apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-a
  labels:
    app: aceest-fitness
    version: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: a
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:version-a
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-b
  labels:
    app: aceest-fitness
    version: b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: b
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:version-b
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-ab-service
spec:
  type: NodePort
  selector:
    app: aceest-fitness
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30083
