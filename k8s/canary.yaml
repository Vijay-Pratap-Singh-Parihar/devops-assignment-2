apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  labels:
    app: aceest-fitness
    release: stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest-fitness
      release: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        release: stable
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:stable
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-canary
  labels:
    app: aceest-fitness
    release: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      release: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        release: canary
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:candidate
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-canary-service
spec:
  type: NodePort
  selector:
    app: aceest-fitness
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30082
