apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-blue
  labels:
    app: aceest-fitness
    track: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      track: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: blue
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:stable
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
  labels:
    app: aceest-fitness
    track: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      track: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: green
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:candidate
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-blue-green-service
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    track: blue
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30081
