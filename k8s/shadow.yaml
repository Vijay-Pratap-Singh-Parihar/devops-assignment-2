apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-primary
  labels:
    app: aceest-fitness
    role: primary
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      role: primary
  template:
    metadata:
      labels:
        app: aceest-fitness
        role: primary
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:stable
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
  labels:
    app: aceest-fitness
    role: shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      role: shadow
  template:
    metadata:
      labels:
        app: aceest-fitness
        role: shadow
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/library/devops-assignment-2:candidate
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-primary-service
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    role: primary
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30084
